<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dual Role IoT Monitoring System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container mt-4">

<h1 class="text-center mb-4">

🏥 Dual Role IoT Monitoring System

</h1>

<div class="row">

<!-- Medical Dashboard -->

<div class="col-lg-6">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h3>Medical Staff Dashboard</h3>

</div>

<div class="card-body">

<div class="sensor">

<label>❤️ Heart Rate</label>

<h2 id="heartRate">0 BPM</h2>

<div class="progress">

<div id="heartBar"
class="progress-bar bg-danger"
style="width:0%">
</div>

</div>

</div>

<hr>

<div class="sensor">

<label>🩸 SpO₂</label>

<h2 id="spo2">0 %</h2>

<div class="progress">

<div id="spo2Bar"
class="progress-bar bg-success"
style="width:0%">
</div>

</div>

</div>

<hr>

<div class="sensor">

<label>🌡 Body Temperature</label>

<h2 id="bodyTemp">0 °C</h2>

<div class="progress">

<div id="bodyBar"
class="progress-bar bg-warning"
style="width:0%">
</div>

</div>

</div>

</div>

</div>

</div>

<!-- Facility Dashboard -->

<div class="col-lg-6">

<div class="card shadow">

<div class="card-header bg-success text-white">

<h3>Facility Management Dashboard</h3>

</div>

<div class="card-body">

<div class="sensor">

<label>🌡 Room Temperature</label>

<h2 id="roomTemp">0 °C</h2>

<div class="progress">

<div id="roomBar"
class="progress-bar bg-info"
style="width:0%">
</div>

</div>

</div>

<hr>

<div class="sensor">

<label>🫁 Oxygen Level</label>

<h2 id="oxygen">0 %</h2>

<div class="progress">

<div id="oxygenBar"
class="progress-bar bg-primary"
style="width:0%">
</div>

</div>

</div>

<hr>

<div class="sensor">

<label>🌫 AQI</label>

<h2 id="aqi">0</h2>

<div class="progress">

<div id="aqiBar"
class="progress-bar bg-dark"
style="width:0%">
</div>

</div>

</div>

</div>

</div>

</div>

</div>

<!-- Alerts -->

<div class="card mt-4 shadow">

<div class="card-header bg-danger text-white">

<h3>🚨 Alert Feed</h3>

</div>

<div class="card-body">

<ul id="alerts">

<li>No Alerts</li>

</ul>

</div>

</div>

<!-- Average Chart -->

<div class="card mt-4 shadow">

<div class="card-header bg-secondary text-white">

<h3>Sensor Summary</h3>

</div>

<div class="card-body">

<canvas id="summaryChart"></canvas>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
